name: release-sdk

on:
  workflow_dispatch:
  push:
    tags:
      - "sdk-v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build SDK package
        run: |
          python -m pip install --upgrade pip
          pip install build
          cd sdk
          python -m build
