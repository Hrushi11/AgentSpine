services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: ["uvicorn", "agentspine_server.app:create_app", "--factory", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    volumes:
      - ./server/src:/app/src
      - ./sdk/src:/sdk/src
      - ./configs:/app/configs
    environment:
      AGENTSPINE_CONFIG_PATH: /app/configs/agentspine.yaml
      AGENTSPINE_LOG_LEVEL: debug

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    command: ["npm", "run", "dev"]
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      AGENTSPINE_API_URL: http://server:8080
