version: "3.8"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: ["uvicorn", "agentspine_server.app:create_app", "--factory", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    volumes:
      - ./server/src:/app/src
      - ./sdk/src:/app/sdk/src
      - ./configs:/app/configs
    environment:
      - AGENTSPINE_CONFIG_PATH=/app/configs/agentspine.yaml
      - AGENTSPINE_LOG_LEVEL=debug

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    command: ["npm", "run", "dev"]
    volumes:
      - ./dashboard/src:/app/src
      - ./dashboard/public:/app/public
